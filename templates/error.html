{% extends "base.html" %}

{% block title %}Error - FinParse{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto mt-12">
    <div class="card p-8 border-l-4 border-l-red-500">
        <div class="flex items-center space-x-4 mb-4">
            <div class="p-2 bg-red-100 rounded-full">
                <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>
            <h1 class="text-xl font-bold text-gray-900">{{ error_title }}</h1>
        </div>
        
        <p class="text-gray-700 mb-6 font-medium">{{ error_message }}</p>
        
        {% if details %}
        <div class="bg-gray-50 rounded-md p-4 border border-gray-200 font-mono text-sm mb-6">
            <h3 class="text-gray-500 mb-2 uppercase tracking-wider text-xs font-semibold">Technical Details</h3>
            <ul class="space-y-1">
                {% for detail in details %}
                <li class="text-gray-700 flex items-start">
                    <span class="text-gray-400 mr-2">›</span>
                    {{ detail }}
                </li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}
        
        <div class="mt-4">
            <a href="/" class="inline-flex items-center text-gray-700 bg-white hover:bg-gray-50 border border-gray-300 font-medium rounded-md text-sm px-4 py-2 transition-colors">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                Upload Another File
            </a>
        </div>
    </div>
</div>
{% endblock %}
