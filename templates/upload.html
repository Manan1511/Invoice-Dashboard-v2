{% extends "base.html" %}

{% block title %}Upload - FinParse{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto mt-12">
    <div class="card p-8">
        <h1 class="text-2xl font-bold mb-2 text-gray-900">Upload Financial Data</h1>
        <p class="text-gray-500 mb-8 text-sm">Upload your multi-tab Excel file containing Ledgers, Trial Balance, and Stock sheets to generate dynamic P&L reports.</p>
        
        <form action="/upload" method="post" enctype="multipart/form-data" class="space-y-6">
            <div class="flex items-center justify-center w-full">
                <label for="dropzone-file" class="flex flex-col items-center justify-center w-full h-56 border-2 border-gray-300 border-dashed rounded-md cursor-pointer bg-gray-50 hover:bg-gray-100 hover:border-blue-500 transition-colors">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6">
                        <svg class="w-10 h-10 mb-4 text-gray-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 16">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2"/>
                        </svg>
                        <p class="mb-2 text-sm text-gray-600"><span class="font-semibold text-blue-600">Click to upload</span> or drag and drop</p>
                        <p class="text-xs text-gray-500">.xlsx files only</p>
                    </div>
                    <input id="dropzone-file" type="file" name="file" class="hidden" accept=".xlsx" required />
                </label>
            </div>
            <div id="file-name" class="text-sm text-blue-600 hidden text-center font-medium bg-blue-50 py-2 rounded"></div>
            <button type="submit" class="w-full text-white bg-gray-900 hover:bg-gray-800 font-semibold rounded-md text-sm px-5 py-3.5 text-center transition-colors">
                Process File
            </button>
        </form>
    </div>
</div>

<script>
    document.getElementById('dropzone-file').addEventListener('change', function(e) {
        const fileName = e.target.files[0]?.name;
        if (fileName) {
            const display = document.getElementById('file-name');
            display.textContent = 'Selected File: ' + fileName;
            display.classList.remove('hidden');
        }
    });
</script>
{% endblock %}
